        <h1>Google Advance Search</h1>
        <br>
        
        <h2>Search on basis parameters </h2>
        <br>
<form action="https://www.google.com/search">
    <label>all these words:</label><br><br>
    <input type="text" name="as_q"><br><br>

    <label>this exact word or phrase:</label><br><br>
    <input type="text" name="as_epq"><br><br>

    <label>any of these words:</label><br><br>
    <input type="text" name="as_oq"><br><br>

    <label>none of these words:</label><br><br>
    <input type="text" name="as_eq"><br><br>

    <input type="submit" value="Advanced Search">
</form>
